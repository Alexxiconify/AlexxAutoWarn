name: alexxautowarn
version: '1.0.1'
main: net.alexxiconify.alexxautowarn.AlexxAutoWarn
api-version: '1.21'
author: Alexxiconify
description: A lightweight rectangular zone warning plugin for Paper.
softdepend: [CoreProtect]
commands:
  autowarn:
    description: Main command for AutoWarn zone management.
    usage: /<command> [subcommand] [args]
    aliases: [aw]
    permission: autowarn.admin.use
permissions:
  autowarn.admin.*:
    description: Grants access to all admin commands.
    children:
      autowarn.admin.use: true
      autowarn.wand: true
      autowarn.pos: true
      autowarn.define: true
      autowarn.remove: true
      autowarn.list: true
      autowarn.info: true
      autowarn.defaultaction: true
      autowarn.setaction: true
      autowarn.removeaction: true
      autowarn.priority: true
      autowarn.banned: true
      autowarn.reload: true
  autowarn.admin.use:
    description: Allows use of the AutoWarn admin commands.
    default: op
  autowarn.wand:
    description: Allows use of the selection wand.
    default: op
  autowarn.pos:
    description: Allows setting selection positions.
    default: op
  autowarn.define:
    description: Allows defining zones.
    default: op
  autowarn.remove:
    description: Allows removing zones.
    default: op
  autowarn.list:
    description: Allows listing zones.
    default: op
  autowarn.info:
    description: Allows viewing zone information.
    default: op
  autowarn.defaultaction:
    description: Allows setting default actions for zones.
    default: op
  autowarn.setaction:
    description: Allows setting material actions in zones.
    default: op
  autowarn.removeaction:
    description: Allows removing material actions from zones.
    default: op
  autowarn.priority:
    description: Allows setting zone priorities.
    default: op
  autowarn.banned:
    description: Allows managing globally banned materials.
    default: op
  autowarn.reload:
    description: Allows reloading the plugin configuration.
    default: op
  autowarn.bypass:
    description: Bypasses zone restrictions.
    default: op
  autowarn.bypass.all:
    description: Bypasses all auto-warn checks.
    default: op
  autowarn.notify:
    description: Receives alerts for actions in zones.
    default: op